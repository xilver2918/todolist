<li class="todo-item {% if section_type == 'completed' %}is-completed{% elif section_type == 'expired' %}is-expired{% endif %}">
    <a class="todo-summary-link" href="{% url 'todo_list' %}?selected={{ todo.id }}">
        <strong class="todo-title">{{ todo.title }}</strong>
        {% if section_type == 'active' and todo.due_date %}
            <span class="todo-date">{{ todo.due_date|date:"Y.m.d" }}&#xAE4C;&#xC9C0;</span>
        {% endif %}
    </a>
    <a class="status-link {% if section_type == 'completed' %}is-completed{% endif %}" href="{% url 'todo_list' %}?status={{ todo.id }}" aria-label="&#xC0C1;&#xD0DC; &#xBCC0;&#xACBD;"></a>
</li>
